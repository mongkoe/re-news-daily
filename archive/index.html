<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>지난 브리핑 목록</title>
<style>
:root { color-scheme: light; }
html { scroll-behavior: smooth; }
* { box-sizing: border-box; }
body {
  margin: 0;
  padding: 0;
  background: #f5f6f8;
  color: #1a1a1a;
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  line-height: 1.5;
}
.wrap { max-width: 760px; margin: 0 auto; padding: 16px; }
header.top { padding: 8px 0 16px; border-bottom: 1px solid #e0e0e0; margin-bottom: 20px; }
header.top h1 { font-size: 22px; margin: 0 0 6px; }
header.top .sub { color: #666; font-size: 14px; margin-bottom: 10px; }
header.top .nav { display: flex; gap: 12px; font-size: 14px; }
header.top .nav a { color: #1a56db; text-decoration: none; }
header.top .nav a:hover { text-decoration: underline; }

section { margin-bottom: 28px; scroll-margin-top: 16px; }
section h2 { font-size: 17px; margin: 0 0 12px; }

.cards { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 560px) {
  .cards { grid-template-columns: 1fr 1fr; }
}
.card {
  display: flex;
  flex-direction: column;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  border: 1px solid #e5e5e5;
}
.card .thumb { width: 100%; height: 140px; object-fit: cover; background: #eee; }
.card .thumb-fallback {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #eef1ff;
  color: #3348c7;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  padding: 0 12px;
}
.card-body { padding: 10px 12px 12px; }
.card-title {
  font-size: 15px;
  margin: 0 0 6px;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .meta { font-size: 12px; color: #888; margin-bottom: 6px; }
.card .summary {
  font-size: 13px;
  color: #555;
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.summary-box {
  background: #eef4ff;
  border: 1px solid #c9dcff;
  border-radius: 12px;
  padding: 16px 18px;
}
.summary-box h2 { margin: 0 0 10px; }
.summary-box .lede { font-size: 14px; color: #1a1a1a; margin: 0 0 12px; line-height: 1.6; }
.overview { margin: 0 0 14px; padding: 12px 14px; background: #fff; border-radius: 8px; border: 1px solid #d9e4fb; }
.overview p { font-size: 13px; color: #333; margin: 0 0 8px; line-height: 1.6; }
.overview p:last-child { margin-bottom: 0; }
.highlight-list { list-style: none; margin: 0; padding: 0; }
.highlight-item {
  font-size: 14px;
  padding: 8px 0;
  border-top: 1px solid #d9e4fb;
  line-height: 1.5;
}
.highlight-item:first-child { border-top: none; }
.highlight-item a { color: #1a1a1a; text-decoration: none; font-weight: 600; }
.highlight-item a:hover { text-decoration: underline; }
.topic-chip {
  display: inline-block;
  background: #3348c7;
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  margin-right: 4px;
  white-space: nowrap;
}

.topic-section h2 { }
.topic-more { margin-top: 8px; font-size: 13px; }
.topic-more summary { cursor: pointer; color: #1a56db; padding: 6px 0; }
.topic-more ul.list { margin-top: 8px; }

.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  background: #eef1ff;
  color: #3348c7;
  font-size: 13px;
  padding: 5px 12px;
  border-radius: 999px;
}

.topic-nav-list { display: flex; flex-wrap: wrap; gap: 8px; }
.topic-nav-chip {
  display: inline-block;
  background: #fff;
  color: #3348c7;
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border: 1px solid #3348c7;
  border-radius: 999px;
  text-decoration: none;
}
.topic-nav-chip:hover { background: #eef1ff; }

.badge {
  display: inline-block;
  background: #fff1e6;
  color: #c25a00;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 6px;
  white-space: nowrap;
}

ul.list { list-style: none; margin: 0; padding: 0; }
.item {
  background: #fff;
  border: 1px solid #e5e5e5;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
}
.item-head { display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px; }
.item-title { font-size: 15px; color: #1a1a1a; text-decoration: none; font-weight: 600; }
.item-title:hover { text-decoration: underline; }
.item .meta { font-size: 12px; color: #888; margin: 4px 0 6px; }
.item .summary { font-size: 13px; color: #555; margin: 0 0 6px; }
.related { font-size: 13px; }
.related summary { cursor: pointer; color: #1a56db; }
.related ul { margin: 6px 0 0; padding-left: 18px; }
.related li { margin-bottom: 4px; }
.related a { color: #1a1a1a; text-decoration: none; }
.related a:hover { text-decoration: underline; }
.related .press { color: #888; }

footer {
  border-top: 1px solid #e0e0e0;
  padding-top: 16px;
  font-size: 12px;
  color: #888;
}
footer .sources { margin-bottom: 8px; }
footer .src.fail { color: #c0392b; }
footer .copyright { margin-bottom: 8px; }
footer a { color: #1a56db; text-decoration: none; }
footer a:hover { text-decoration: underline; }
</style>
</head>

    <li><a href="2026-07-18.html">2026년 7월 18일 (토)</a></li>
    <li><a href="2026-07-17.html">2026년 7월 17일 (금)</a></li>
    </ul>
  </section>
</div>
</body>
</html>
